version = 1

[[annotations]]
path = ["submodules/osi-cpp/**", "submodules/mcap/**", "submodules/osi-python/**"]
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "NOASSERTION"
SPDX-FileComment = "Third-party submodules; licensing handled upstream."

[[annotations]]
path = "python/Makefile"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026, Bayerische Motoren Werke Aktiengesellschaft (BMW AG)"
SPDX-License-Identifier = "MPL-2.0"
SPDX-FileComment = "Makefile cannot embed SPDX comment headers reliably."

[[annotations]]
path = "python/README.md"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026, Bayerische Motoren Werke Aktiengesellschaft (BMW AG)"
SPDX-License-Identifier = "MPL-2.0"
SPDX-FileComment = "Package readme; comment headers would render in PyPI."

[[annotations]]
path = "python/.gitignore"
precedence = "override"
SPDX-FileCopyrightText = "Copyright (c) 2026, Bayerische Motoren Werke Aktiengesellschaft (BMW AG)"
SPDX-License-Identifier = "MPL-2.0"

[[annotations]]
path = ["CMakePresets.json", "vcpkg.json", "vcpkg-configuration.json"]
precedence = "closest"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "MPL-2.0"

[[annotations]]
path = "test-data/**"
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "MPL-2.0"
SPDX-FileComment = "Generated binary test fixtures (esmini/NCAP traces); cannot embed headers."

[[annotations]]
path = "cpp/tests/intentional-failures/**"
precedence = "override"
SPDX-FileCopyrightText = "NONE"
SPDX-License-Identifier = "MPL-2.0"
SPDX-FileComment = "Intentional CI fixture; CI removes this block to trigger failure."
