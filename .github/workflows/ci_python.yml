name: Python

on:
  workflow_call:

jobs:
  # ===========================================================================
  # Lint & Format (ruff) via Make
  # ===========================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: python
        run: make ci-install
        env:
          CI: "1"

      - name: Check formatting and lint
        working-directory: python
        run: make format-check
        env:
          CI: "1"

  # ===========================================================================
  # Test Matrix (Linux, Windows, macOS × Python 3.10–3.12)
  # ===========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install make (Windows)
        if: runner.os == 'Windows'
        run: choco install make -y --no-progress

      - name: Install dependencies
        working-directory: python
        run: make ci-install
        env:
          CI: "1"

      - name: Run tests
        working-directory: python
        run: make test-ci
        env:
          CI: "1"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/test-results.xml
          retention-days: 7

  # ===========================================================================
  # Package build verification
  # ===========================================================================
  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: python
        run: make ci-install
        env:
          CI: "1"

      - name: Build and verify package
        working-directory: python
        run: make package-verify
        env:
          CI: "1"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: python/dist/
          retention-days: 7
