name: Python

on:
  workflow_call:

jobs:
  # ===========================================================================
  # Lint & Format (ruff) via Make
  # ===========================================================================
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup and lint
        run: |
          make setup
          make lint-python

  # ===========================================================================
  # Test Matrix (Linux, Windows, macOS × Python 3.10–3.12)
  # ===========================================================================
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Add make to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "C:\msys64\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup and test
        run: |
          make setup
          make test-python

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: python/test-results.xml
          retention-days: 7

  # ===========================================================================
  # Package build verification
  # ===========================================================================
  package:
    name: Package build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup and build package
        run: |
          make setup
          cd python && make package-verify

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: python/dist/
          retention-days: 7
