name: C++ Build

on:
  workflow_call:
    inputs:
      release:
        description: 'Build for release (install + upload artifacts)'
        required: false
        default: false
        type: boolean
      version:
        description: 'Version string for release artifacts'
        required: false
        default: ''
        type: string

env:
  YQ_VERSION: v4.52.2
  YQ_SHA256: a74bd266990339e0c48a2103534aef692abf99f19390d12c2b0ce6830385c459

jobs:
  # ===========================================================================
  # Ubuntu with system packages (compatibility path)
  # ===========================================================================
  ubuntu:
    name: Ubuntu ${{ matrix.ubuntu }} (${{ matrix.compiler }}, system-compat)
    runs-on: ubuntu-${{ matrix.ubuntu }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        ubuntu: ['22.04', '24.04']
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo curl --fail -L -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${{ env.YQ_VERSION }}/yq_linux_amd64"
          echo "${{ env.YQ_SHA256 }}  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq
          yq -r '.ci_jobs.ubuntu_build.apt' .github/dependencies.yml | xargs sudo apt-get install -y

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset base -DBUILD_TESTING=ON -DCODE_COVERAGE=${{ matrix.compiler == 'gcc' && 'ON' || 'OFF' }}

      - name: Report protobuf linkage (system/base)
        run: |
          echo "FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:"
          grep -E '^FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:INTERNAL=' build/CMakeCache.txt || true

      - name: Build
        run: cmake --build --preset base --parallel $(nproc)

      - name: Validate shell scripts
        run: |
          bash -n scripts/setup-dev.sh
          bash -n scripts/generate_test_traces.sh
          bash -n cpp/tests/integration/run_reader_integration.sh
          bash -n cpp/tests/integration/run_converter_integration.sh

      - name: Run Tests
        working-directory: build
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Generate Coverage Report
        if: matrix.compiler == 'gcc' && matrix.ubuntu == '24.04'
        run: gcovr -r . build --xml -o coverage.xml

      - name: Upload Coverage
        if: matrix.compiler == 'gcc' && matrix.ubuntu == '24.04'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ===========================================================================
  # Ubuntu with vcpkg
  # ===========================================================================
  ubuntu-vcpkg:
    name: Ubuntu (vcpkg)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      - name: Configure CMake
        run: |
          CMAKE_ARGS="-DBUILD_TESTING=ON -DVCPKG_MANIFEST_FEATURES=tests"
          if [ "${{ inputs.release }}" = "true" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install"
          fi
          cmake --preset vcpkg $CMAKE_ARGS

      - name: Verify protobuf linkage (vcpkg/static)
        run: |
          echo "FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:"
          grep -E '^FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:INTERNAL=' build-vcpkg/CMakeCache.txt
          grep -q 'libprotobuf\.a' build-vcpkg/CMakeCache.txt
          if grep -q -E 'libprotobuf\.(so|dylib)' build-vcpkg/CMakeCache.txt; then
            echo "Unexpected shared protobuf linkage in vcpkg build"
            exit 1
          fi

      - name: Build
        run: cmake --build --preset vcpkg --parallel $(nproc)

      - name: Run Tests
        working-directory: build-vcpkg
        run: ctest --output-on-failure --parallel $(nproc)

      - name: Install
        if: inputs.release
        run: cmake --install build-vcpkg

      - name: Create release archive
        if: inputs.release
        run: |
          cd $GITHUB_WORKSPACE/install
          tar -czvf $GITHUB_WORKSPACE/asam-osi-utilities-${{ inputs.version }}-linux-x64.tar.gz .

      - name: Upload release artifact
        if: inputs.release
        uses: actions/upload-artifact@v4
        with:
          name: asam-osi-utilities-${{ inputs.version }}-linux-x64
          path: asam-osi-utilities-${{ inputs.version }}-linux-x64.tar.gz
          retention-days: 1

  # ===========================================================================
  # Ubuntu with vcpkg — shared OSI linking
  # ===========================================================================
  ubuntu-vcpkg-shared:
    name: Ubuntu (vcpkg, shared OSI)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      # A dynamic vcpkg triplet is required so that protobuf (and abseil) are
      # also built as shared libraries.  Without this, static protobuf is linked
      # into BOTH the shared OSI .so AND the consumer binary, causing duplicate
      # protobuf descriptor registration and a fatal "CheckTypeAndMergeFrom" crash.
      - name: Configure CMake (shared OSI, dynamic triplet)
        run: cmake --preset vcpkg-shared-linux -DBUILD_TESTING=ON -DVCPKG_MANIFEST_FEATURES=tests

      - name: Build
        run: cmake --build --preset vcpkg-shared-linux --parallel $(nproc)

      - name: Verify shared OSI library produced
        run: |
          echo "--- Checking for shared OSI library ---"
          SO=$(find build-vcpkg -name 'libopen_simulation_interface.so*' | head -1)
          if [ -z "$SO" ]; then
            echo "ERROR: Shared OSI library (.so) not found in build tree"
            exit 1
          fi
          echo "Found: $SO"
          file "$SO"
          echo "--- Checking test executable links shared OSI ---"
          TEST_EXE=$(find build-vcpkg -name 'unit_tests' -type f | head -1)
          if [ -n "$TEST_EXE" ]; then
            ldd "$TEST_EXE" | grep -E 'open_simulation_interface|protobuf' || true
          fi
          echo "Shared OSI library verified ✓"

      - name: Run Tests
        working-directory: build-vcpkg
        run: |
          # Add both the shared OSI build dir and vcpkg dynamic libs to the
          # runtime search path so the test binary can find all shared deps.
          OSI_LIB_DIR=$(dirname "$(find . -name 'libopen_simulation_interface.so.*' | head -1)")
          VCPKG_LIB_DIR=$(find . -path '*/x64-linux-dynamic/lib' -type d | head -1)
          echo "OSI_LIB_DIR=$OSI_LIB_DIR"
          echo "VCPKG_LIB_DIR=$VCPKG_LIB_DIR"
          export LD_LIBRARY_PATH="${OSI_LIB_DIR}:${VCPKG_LIB_DIR}:${LD_LIBRARY_PATH:-}"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          ctest --output-on-failure --parallel $(nproc)

  # ===========================================================================
  # macOS with vcpkg — shared OSI linking
  # ===========================================================================
  macos-vcpkg-shared:
    name: macOS (vcpkg, shared OSI)
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      # Dynamic triplet required — see Ubuntu shared job comment for rationale.
      - name: Configure CMake (shared OSI, dynamic triplet)
        run: cmake --preset vcpkg-shared-macos -DBUILD_TESTING=ON -DVCPKG_MANIFEST_FEATURES=tests

      - name: Build
        run: cmake --build --preset vcpkg-shared-macos --parallel $(sysctl -n hw.ncpu)

      - name: Verify shared OSI library produced
        run: |
          echo "--- Checking for shared OSI library ---"
          DYLIB=$(find build-vcpkg -name 'libopen_simulation_interface*.dylib' | head -1)
          if [ -z "$DYLIB" ]; then
            echo "ERROR: Shared OSI library (.dylib) not found in build tree"
            exit 1
          fi
          echo "Found: $DYLIB"
          file "$DYLIB"
          echo "--- Checking test executable links shared OSI ---"
          TEST_EXE=$(find build-vcpkg -name 'unit_tests' -type f | head -1)
          if [ -n "$TEST_EXE" ]; then
            otool -L "$TEST_EXE" | grep -E 'open_simulation_interface|protobuf' || true
          fi
          echo "Shared OSI library verified ✓"

      - name: Run Tests
        working-directory: build-vcpkg
        run: |
          # Add both the shared OSI build dir and vcpkg dynamic libs to the
          # runtime search path so the test binary can find all shared deps.
          OSI_LIB_DIR=$(dirname "$(find . -name 'libopen_simulation_interface*.dylib' | head -1)")
          VCPKG_LIB_DIR=$(find . -path '*/arm64-osx-dynamic/lib' -type d | head -1)
          echo "OSI_LIB_DIR=$OSI_LIB_DIR"
          echo "VCPKG_LIB_DIR=$VCPKG_LIB_DIR"
          export DYLD_LIBRARY_PATH="${OSI_LIB_DIR}:${VCPKG_LIB_DIR}:${DYLD_LIBRARY_PATH:-}"
          echo "DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH"
          ctest --output-on-failure --parallel $(sysctl -n hw.ncpu)

  # ===========================================================================
  # Windows with vcpkg (default preset / compatibility coverage)
  # ===========================================================================
  windows-vcpkg:
    name: Windows (MSVC, vcpkg default)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      - name: Configure CMake
        run: cmake --preset vcpkg -DBUILD_DOCS=OFF -DBUILD_TESTING=ON -DVCPKG_MANIFEST_FEATURES=tests

      - name: Report vcpkg triplet (windows default)
        shell: pwsh
        run: |
          $line = Select-String -Path "build-vcpkg/CMakeCache.txt" -Pattern '^VCPKG_TARGET_TRIPLET:STRING='
          if ($line) {
            $value = ($line.Line -split '=')[1]
            Write-Host "Configured triplet: $value"
          } else {
            Write-Host "VCPKG_TARGET_TRIPLET not explicitly set in CMakeCache.txt"
          }

      - name: Build
        run: cmake --build --preset vcpkg --parallel

      - name: Run Tests
        working-directory: build-vcpkg
        run: ctest -C Release --output-on-failure --parallel

  # ===========================================================================
  # Windows with vcpkg static-md (preferred packaging path)
  # ===========================================================================
  windows-vcpkg-static-md:
    name: Windows (MSVC, vcpkg static-md)
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      - name: Configure CMake
        shell: pwsh
        run: |
          $cmakeArgs = @("-DBUILD_DOCS=OFF", "-DBUILD_TESTING=ON", "-DVCPKG_MANIFEST_FEATURES=tests")
          if ("${{ inputs.release }}" -eq "true") {
            $cmakeArgs += "-DCMAKE_INSTALL_PREFIX=$env:GITHUB_WORKSPACE/install"
          }
          cmake --preset vcpkg-windows-static-md @cmakeArgs

      - name: Verify vcpkg triplet (windows)
        shell: pwsh
        run: |
          $line = Select-String -Path "build-vcpkg/CMakeCache.txt" -Pattern '^VCPKG_TARGET_TRIPLET:STRING='
          if (-not $line) { throw "VCPKG_TARGET_TRIPLET not found in CMakeCache.txt" }
          $value = ($line.Line -split '=')[1]
          Write-Host "Configured triplet: $value"
          if ($value -ne "x64-windows-static-md") {
            throw "Expected x64-windows-static-md, got $value"
          }

      - name: Build
        run: cmake --build --preset vcpkg-windows-static-md --parallel

      - name: Run Tests
        working-directory: build-vcpkg
        run: ctest -C Release --output-on-failure --parallel

      - name: Install
        if: inputs.release
        run: cmake --install build-vcpkg --config Release

      - name: Create release archive
        if: inputs.release
        shell: pwsh
        run: |
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\install\*" -DestinationPath "$env:GITHUB_WORKSPACE\asam-osi-utilities-${{ inputs.version }}-windows-x64.zip"

      - name: Upload release artifact
        if: inputs.release
        uses: actions/upload-artifact@v4
        with:
          name: asam-osi-utilities-${{ inputs.version }}-windows-x64
          path: asam-osi-utilities-${{ inputs.version }}-windows-x64.zip
          retention-days: 1

  # ==========================================================================
  # macOS with vcpkg
  # ==========================================================================
  macos-vcpkg:
    name: macOS (vcpkg, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: x64
          - runner: macos-14
            arch: arm64

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '4f8fe05871555c1798dbcb1957d0d595e94f7b57'

      - name: Configure CMake
        run: |
          CMAKE_ARGS="-DBUILD_TESTING=ON -DVCPKG_MANIFEST_FEATURES=tests"
          if [ "${{ inputs.release }}" = "true" ]; then
            CMAKE_ARGS="$CMAKE_ARGS -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install"
          fi
          cmake --preset vcpkg $CMAKE_ARGS

      - name: Verify protobuf linkage (vcpkg/static)
        run: |
          echo "FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:"
          grep -E '^FIND_PACKAGE_MESSAGE_DETAILS_Protobuf:INTERNAL=' build-vcpkg/CMakeCache.txt
          grep -q 'libprotobuf\.a' build-vcpkg/CMakeCache.txt
          if grep -q -E 'libprotobuf\.(so|dylib)' build-vcpkg/CMakeCache.txt; then
            echo "Unexpected shared protobuf linkage in vcpkg build"
            exit 1
          fi

      - name: Build
        run: cmake --build --preset vcpkg --parallel $(sysctl -n hw.ncpu)

      - name: Run Tests
        working-directory: build-vcpkg
        run: ctest --output-on-failure --parallel $(sysctl -n hw.ncpu)

      - name: Install
        if: inputs.release
        run: cmake --install build-vcpkg

      - name: Create release archive
        if: inputs.release
        run: |
          cd $GITHUB_WORKSPACE/install
          tar -czvf $GITHUB_WORKSPACE/asam-osi-utilities-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz .

      - name: Upload release artifact
        if: inputs.release
        uses: actions/upload-artifact@v4
        with:
          name: asam-osi-utilities-${{ inputs.version }}-macos-${{ matrix.arch }}
          path: asam-osi-utilities-${{ inputs.version }}-macos-${{ matrix.arch }}.tar.gz
          retention-days: 1
